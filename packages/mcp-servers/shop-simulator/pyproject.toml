[project]
name = "shop-simulator"
version = "0.1.0"
description = "MCP Server - Shop Simulator (角色商店购买模拟)"
requires-python = ">=3.13"
dependencies = [
    "mcp>=1.0",
    "structlog>=24.4",
    "pydantic>=2.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
