[project]
name = "code-executor"
version = "0.1.0"
description = "MCP Server - Code Executor"
requires-python = ">=3.13"
dependencies = [
    "fastmcp>=2.0",  # FastMCP 2.0+
    "structlog>=24.4",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6.0",
    "testcontainers>=4.9",
    "ruff>=0.8",
    "mypy>=1.14",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]