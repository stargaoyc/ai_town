# Prometheus 配置 - AI Town 指标采集
# 采集后端 /metrics 端点暴露的 Prometheus 指标

global:
  scrape_interval: 15s          # 默认采集间隔
  evaluation_interval: 15s      # 规则评估间隔
  external_labels:
    monitor: "ai-town-monitor"

# 告警规则（可选，配合 Alertmanager 使用）
# rule_files:
#   - /etc/prometheus/rules/*.yml

# 采集目标
scrape_configs:
  # AI Town 后端 - FastAPI /metrics 端点
  - job_name: "ai-town-backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          service: "backend"
          env: "local"

  # Prometheus 自身指标
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Loki 指标
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service: "loki"

  # Jaeger 指标
  - job_name: "jaeger"
    static_configs:
      - targets: ["jaeger:14269"]
        labels:
          service: "jaeger"

  # Grafana Alloy 自身指标
  - job_name: "alloy"
    static_configs:
      - targets: ["alloy:12345"]
        labels:
          service: "alloy"
