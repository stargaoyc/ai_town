# Grafana Dashboard Provider - 自动加载 JSON 面板

apiVersion: 1

providers:
  - name: "AI Town Dashboards"
    orgId: 1
    folder: "AI Town"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
