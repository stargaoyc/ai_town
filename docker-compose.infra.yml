# docker-compose.infra.yml - 仅基础设施（用于本地开发）
services:
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    environment:
      POSTGRES_DB: ai_town
      POSTGRES_USER: ai_town
      POSTGRES_PASSWORD: password
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_town"]
      interval: 10s

  redis:
    image: redis:8.0-alpine
    ports: ["6379:6379"]
    volumes: [redis_data:/data]

  # ============================================================
  # 可观测性组件
  # ============================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: aitown-prometheus
    restart: unless-stopped
    volumes:
      - ./docker/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - default

  loki:
    image: grafana/loki:3.0.0
    container_name: aitown-loki
    restart: unless-stopped
    volumes:
      - ./docker/observability/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - default

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: aitown-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"
    networks:
      - default

  alloy:
    image: grafana/alloy:latest
    container_name: aitown-alloy
    restart: unless-stopped
    volumes:
      - ./docker/observability/alloy.config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/logs:/var/log/aitown:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    ports:
      - "12345:12345"
    depends_on:
      - loki
    networks:
      - default

  grafana:
    image: grafana/grafana:12.0.0
    container_name: aitown-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/observability/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./docker/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - jaeger
    networks:
      - default

volumes:
  pg_data:
  redis_data:
  prometheus_data:
  loki_data:
  grafana_data:
